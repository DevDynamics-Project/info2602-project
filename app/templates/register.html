{% extends "base.html" %}
{% block title %}Register — My Workout Mixer{% endblock %}

{% block content %}
<body class="auth-body">
  <div class="bg-images">
    <img src="/static/img/fit1.jpg" alt="">
    <img src="/static/img/fit2.jpg" alt="">
    <img src="/static/img/fit3.jpg" alt="">
  </div>
  <div class="vertical-text vertical-left">DISCIPLINE OVER MOTIVATION</div>
  <div class="vertical-text vertical-right">DISCIPLINE OVER MOTIVATION</div>

  <div class="auth-header">
    <div class="circle"></div>
    <h1>My Workout Mixer</h1>
    <div class="circle"></div>
  </div>
  <hr class="auth-hr">

  <div class="auth-wrapper">
    <div class="auth-container">
      <h2>Register</h2>
      <form method="post" action="/register">
        <label>Username</label>
        <input type="text" name="username" required autocomplete="username">
        <label>Email</label>
        <input type="email" name="email" required autocomplete="email">
        <label>Password</label>
        <input type="password" name="password" required autocomplete="new-password">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" required autocomplete="new-password">
        <button type="submit">Register</button>
      </form>
      <p>Already have an account? <a href="/login">Sign in</a></p>
    </div>
  </div>
</body>
{% endblock %}
