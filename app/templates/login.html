{% extends "base.html" %}
{% block title %}Login — My Workout Mixer{% endblock %}

{% block content %}
<body class="auth-body">
  <div class="bg-images">
    <img src="/static/img/fit1.jpg" alt="">
    <img src="/static/img/fit2.jpg" alt="">
    <img src="/static/img/fit3.jpg" alt="">
  </div>
  <div class="vertical-text vertical-left">DISCIPLINE OVER MOTIVATION</div>
  <div class="vertical-text vertical-right">DISCIPLINE OVER MOTIVATION</div>

  <div class="auth-header">
    <div class="circle"></div>
    <h1>My Workout Mixer</h1>
    <div class="circle"></div>
  </div>
  <hr class="auth-hr">

  <div class="auth-wrapper">
    <div class="auth-container">
      <h2>Login</h2>
      <form method="post" action="/login">
        <label>Username</label>
        <input type="text" name="username" required autocomplete="username">
        <label>Password</label>
        <input type="password" name="password" required autocomplete="current-password">
        <button type="submit">Login</button>
      </form>
      <p>No account? No problem!</p>
      <a href="/register" class="btn-auth">Register</a>
    </div>
  </div>
</body>
{% endblock %}
