{% extends "authenticated_base.html" %}
{% block title %}Workouts — My Workout Mixer{% endblock %}

{% block extra_js %}
<script src="/static/js/app.js" defer></script>
{% endblock %}

{% block page_content %}
<div class="page-wrap">
  <h1 class="page-title">WORKOUTS</h1>
  <p class="page-subtitle">Browse the library and add exercises to your routines</p>

  <input
    type="text"
    id="search"
    class="search-bar"
    placeholder="Search by name, muscle group or difficulty…"
    oninput="handleSearch()"
  >

  <div class="workout-grid" id="workout-grid">
    {% for i in range(8) %}
    <div class="w-card">
      <div class="skel" style="height:18px;width:70%;margin-bottom:6px"></div>
      <div class="skel" style="height:12px;width:90%;margin-bottom:4px"></div>
      <div class="skel" style="height:12px;width:60%;margin-bottom:10px"></div>
      <div class="skel" style="height:32px;margin-top:6px"></div>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
