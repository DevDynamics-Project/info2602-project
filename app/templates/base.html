<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}My Workout Mixer{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% set messages = get_flashed_messages(request) %}
  {% if messages %}
  <div class="flash-wrap">
    {% for msg in messages %}
    <div class="flash {{ msg.type }}">{{ msg.message }}</div>
    {% endfor %}
  </div>
  {% endif %}

  {% block content %}{% endblock %}

  <div class="toast-wrap"><div class="toast" id="global-toast"></div></div>

  {% block extra_js %}{% endblock %}
  <script>
    function showToast(msg, isError) {
      const t = document.getElementById('global-toast');
      t.textContent = msg;
      t.className = 'toast' + (isError ? ' error' : '') + ' show';
      setTimeout(() => { t.className = 'toast' + (isError ? ' error' : ''); }, 2400);
    }
    setTimeout(() => {
      document.querySelectorAll('.flash').forEach(el => {
        el.style.transition = 'opacity 0.4s';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 400);
      });
    }, 3000);
  </script>
</body>
</html>
